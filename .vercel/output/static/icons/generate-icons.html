<!doctype html>
<html>
  <head>
    <title>Generate Pulse Icons</title>
  </head>
  <body>
    <p>Open browser console and run generateAll() to download all icons.</p>
    <canvas id="c"></canvas>
    <script>
      const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

      function drawIcon(size) {
        const canvas = document.getElementById("c");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Background
        ctx.fillStyle = "#0f1011";
        const r = size * 0.18;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fill();

        // Draw 6x6 dot matrix (P pattern) centered
        const cols = 6,
          rows = 6;
        const padding = size * 0.14;
        const dotArea = size - padding * 2;
        const gap = dotArea / (cols - 1);
        const dotR = gap * 0.32;

        // Pattern from pulse_dot_matrix_final.svg (columns x rows)
        // col 0: D,R,R,R,R,R | col 1: D,D,R,D,D,R | col 2: D,D,D,D,D,R
        // col 3: R,R,R,R,R,R | col 4: R,D,D,R,D,R | col 5: D,R,R,D,R,D
        const pattern = [
          ["D", "D", "D", "R", "R", "D"],
          ["R", "D", "D", "R", "D", "R"],
          ["R", "R", "D", "R", "D", "R"],
          ["R", "D", "D", "R", "R", "D"],
          ["R", "D", "D", "R", "D", "R"],
          ["R", "R", "R", "R", "R", "D"],
        ];

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const x = padding + col * gap;
            const y = padding + row * gap;
            ctx.fillStyle = pattern[row][col] === "R" ? "#e5484d" : "#34343a";
            ctx.beginPath();
            ctx.arc(x, y, dotR, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        return canvas.toDataURL("image/png");
      }

      function download(dataUrl, filename) {
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = filename;
        a.click();
      }

      function generateAll() {
        sizes.forEach((size) => {
          const data = drawIcon(size);
          download(data, `icon-${size}.png`);
        });
      }

      // Auto-generate on load
      window.onload = generateAll;
    </script>
  </body>
</html>
